<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci — Phôs Studio</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231a1a1a'/><text x='50' y='72' font-size='68' text-anchor='middle' fill='%23b5a48a' font-family='Georgia,serif' font-style='italic'>P</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #f5f5f3;
      color: #1a1a1a;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.65;
      overflow-x: hidden;
    }
    @media (hover: hover) { body { cursor: none; } }

    .cursor {
      position: fixed;
      width: 16px;
      height: 16px;
      background: rgba(15, 15, 15, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .2s ease, height .2s ease;
    }
    @media (hover: none) { .cursor { display: none; } }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      animation: fadein 2s cubic-bezier(.16,1,.3,1) both;
    }

    .merci-title {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 200;
      letter-spacing: 15px;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    .merci-sub {
      font-size: 14px;
      font-weight: 300;
      color: #888;
      letter-spacing: 2px;
      max-width: 420px;
    }

    .btn-back {
      display: inline-block;
      margin-top: 40px;
      padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #1a1a1a;
      text-decoration: none;
      border: 1px solid rgba(26,26,26,0.35);
      border-radius: 60px;
      background: transparent;
      transition: background .3s ease, color .3s ease, border-color .3s ease;
    }
    .btn-back:hover {
      background: #1a1a1a;
      color: #f5f5f3;
      border-color: #1a1a1a;
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <div class="page">
    <h1 class="merci-title">Merci</h1>
    <p class="merci-sub">Merci pour votre confiance, nous revenons vers vous très vite.</p>
    <a href="index.html" class="btn-back">Retour au site</a>
  </div>

  <script>
    /* ── Cursor ── */
    if (window.matchMedia('(hover: hover)').matches) {
      const cursor = document.getElementById('cursor');
      let cx = 0, cy = 0, tx = 0, ty = 0;
      document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
      (function loop() {
        cx += (tx - cx) * 0.12;
        cy += (ty - cy) * 0.12;
        cursor.style.left = cx + 'px';
        cursor.style.top  = cy + 'px';
        requestAnimationFrame(loop);
      })();
    }
  </script>

</body>
</html>
